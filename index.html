<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CubeRealm Launcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f1a;
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    header {
        padding: 12px;
        background: #121a2b;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .buttons {
        display: flex;
        gap: 10px;
    }

    button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        color: white;
        background: #2b6fff;
        transition: 0.2s;
    }

    button:hover {
        background: #1f55c4;
    }

    .container {
        flex: 1;
        display: flex;
    }

    iframe {
        flex: 1;
        border: none;
        background: black;
    }

    .sidebar {
        width: 260px;
        background: #0f1525;
        padding: 10px;
        box-sizing: border-box;
        border-left: 1px solid rgba(255,255,255,0.1);
    }

    .linkBox {
        padding: 10px;
        background: rgba(255,255,255,0.05);
        border-radius: 10px;
        margin-bottom: 10px;
        font-size: 13px;
    }
</style>
</head>

<body>

<header>
    <div>🟦 CubeRealm Launcher</div>

    <div class="buttons">
        <button onclick="openGame()">Go to Main Game</button>
        <button onclick="loadIframe()">Load Private Server</button>
    </div>
</header>

<div class="container">

    <iframe id="frame" src="https://tinyurl.com/cuberealm"></iframe>

    <div class="sidebar">
        <div class="linkBox">
            <b>Private Server:</b><br>
            tinyurl.com/cuberealm
        </div>

        <div class="linkBox">
            <b>Main Game:</b><br>
            cuberealm.io
        </div>

        <p style="opacity:0.7;font-size:12px;">
            If the iframe is blank, the site is blocking embedding. Use the button instead.
        </p>
    </div>

</div>

<script>
    function openGame() {
        window.location.href = "https://cuberealm.io";
    }

    function loadIframe() {
        document.getElementById("frame").src = "https://tinyurl.com/cuberealm";
    }
</script>

</body>
</html>
