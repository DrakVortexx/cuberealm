<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CubeRealm Launcher</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0f1a;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.card {
    width:400px;
    background:#121a2b;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2b6fff;
    color:white;
    cursor:pointer;
}
button:hover { background:#1f55c4; }
</style>
</head>

<body>

<div class="card">
    <h2>🟦 CubeRealm Launcher</h2>

    <p id="status">
        Step 1: Log in to CubeRealm
    </p>

    <button onclick="openLogin()">Open Login Page</button>

    <button onclick="confirmLogin()" style="background:#444;">
        I’ve logged in
    </button>
</div>

<script>
function openLogin() {
    window.open("https://cuberealm.io/login", "_blank");
    document.getElementById("status").innerText =
        "Log in in the new tab, then come back here.";
}

function confirmLogin() {
    document.getElementById("status").innerText =
        "Connecting to main server...";

    setTimeout(() => {
        window.location.href = "https://cuberealm.io";
    }, 1000);
}
</script>

</body>
</html>
